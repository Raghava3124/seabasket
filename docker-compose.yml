version: '3.8'
services:
  db:
    image: postgres:15
    container_name: seabasket-postgres
    environment:
      POSTGRES_USER: seabasket_user
      POSTGRES_PASSWORD: seabasket_password
      POSTGRES_DB: seabasket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: seabasket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
